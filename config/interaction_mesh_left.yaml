# Interaction Mesh Hand Retargeting Config (LEFT HAND)
# Algorithm: Laplacian deformation minimization with SOCP constraints
# Adapted from OmniRetarget robot_only mode for WujiHand
#
# Key difference from baseline:
#   - No per-segment scaling (Laplacian + FK handles proportion differences)
#   - Single global scale auto-computed from robot hand geometry
#   - Matches OmniRetarget's smpl_scale approach

hand_side: left

optimization:
  step_size: 0.1           # Trust region radius (SOC constraint)
  smooth_weight: 0.2       # Temporal smoothness weight (matches OmniRetarget default)
  n_iter_first: 50         # SQP iterations for first frame
  n_iter: 10               # SQP iterations for subsequent frames
  activate_joint_limits: true
  activate_self_collision: false

retarget:
  # Global scale: auto-computed if not set (robot_palm_to_mid_tip / human_palm_to_mid_tip)
  # global_scale: 0.5  # uncomment to override auto-compute

  # MediaPipe rotation adjustment (degrees)
  mediapipe_rotation:
    x: 0.0
    y: 0.0
    z: 15.0
